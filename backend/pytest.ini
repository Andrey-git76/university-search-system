[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short --cov=app --cov-report=term-missing:skip-covered --cov-fail-under=50 -m "not e2e and not load and not evaluation"
markers =
    e2e: end-to-end tests (Playwright, requires full stack)
    load: load tests (Locust, requires running API)
    evaluation: search quality evaluation (requires Elasticsearch)
filterwarnings =
    ignore::DeprecationWarning